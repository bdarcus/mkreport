<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Teaching Evaluation Report Generator</title>
    <link rel="stylesheet" href="css/styles.css">
    
    <!-- Dependencies -->
    <script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/mustache@4.2.0/mustache.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
</head>
<body>
    <header>
        <h1>Teaching Evaluation Report Generator</h1>
        <p>100% private, client-side processing. Your data never leaves your browser.</p>
    </header>

    <main>
        <section class="controls">
            <div class="control-group">
                <label for="excel-upload">Upload Evaluation Excel:</label>
                <input type="file" id="excel-upload" accept=".xlsx, .xls">
            </div>
            
            <div class="control-group">
                <label for="parser-select">Select Report Format:</label>
                <select id="parser-select">
                    <option value="default">Default Format</option>
                    <option value="hierarchical">Hierarchical Format (2025+)</option>
                </select>
            </div>
            
            <div class="control-group action-group">
                <div class="options-group">
                    <label class="checkbox-label">
                        <input type="checkbox" id="compact-toggle"> Combined Table View
                    </label>
                    <label class="checkbox-label">
                        <input type="checkbox" id="group-semester-toggle"> Group by Semester
                    </label>
                </div>
                <button id="generate-btn" class="primary-btn">Generate Report</button>
            </div>
        </section>

        <section id="error-message" class="error-message hidden"></section>

        <section class="output-container">
            <div class="output-header">
                <h2>Generated Report</h2>
                <button id="copy-btn" class="secondary-btn hidden">Copy HTML to Clipboard</button>
            </div>
            <div id="report-output" class="report-output">
                <p class="placeholder">Upload an Excel file and click "Generate Report" to see the results.</p>
            </div>
        </section>
    </main>

    <!-- Detailed Template -->
    <script id="annual-report-template" type="x-tmpl-mustache">
# Teaching Evaluation Summary

{{#semesters}}
{{#isGrouped}}
# Term: {{term}}
{{/isGrouped}}
{{#evaluations}}
## Course: {{courseName}} ({{term}})

**Metrics**
*   **Total Enrollments:** {{enrollments}}
*   **Response Rate:** {{responseRate}}

### Evaluation Results

| Question | Crs Mean | Dept Mean | School Mean | Univ Mean |
| :--- | :---: | :---: | :---: | :---: |
{{#questions}}
| {{{questionText}}} | {{mean}} | {{deptMean}} | {{schoolMean}} | {{univMean}} |
{{/questions}}

### Qualitative Feedback
{{#comments}}
*   "{{.}}"
{{/comments}}

---
{{/evaluations}}
{{/semesters}}
    </script>

    <!-- Compact (Combined) Template -->
    <script id="compact-report-template" type="x-tmpl-mustache">
# Teaching Evaluation Summary (Combined Table)

| Item | Crs Mean | Dept Mean | School Mean | Univ Mean |
| :--- | :---: | :---: | :---: | :---: |
{{#semesters}}
{{#isGrouped}}
| **Term: {{term}}** | | | | |
{{/isGrouped}}
{{#evaluations}}
| **{{courseName}}** ({{term}}, Enr: {{enrollments}}, RR: {{responseRate}}) | | | | |
{{#questions}}
| {{{questionText}}} | {{mean}} | {{deptMean}} | {{schoolMean}} | {{univMean}} |
{{/questions}}
{{/evaluations}}
{{/semesters}}
    </script>

    <!-- App Logic -->
    <script src="js/parsers/default.js"></script>
    <script src="js/parsers/hierarchical.js"></script>
    <script src="js/app.js"></script>
</body>
</html>
